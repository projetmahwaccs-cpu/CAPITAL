<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 72px;
    background: #fff;
    border-bottom: 1px solid #ddd;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    position: relative;
  }

  .logo-img {
    height: 64px;
    width: 64px;
    object-fit: contain;
    flex-shrink: 0;
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-left: 16px;
  }

  .nav-left a, .nav-right a {
    text-decoration: none;
    color: #1a1a2e;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }

  .nav-left a:hover, .nav-right a:hover { color: #1565c0; }

  .brand {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 26px;
    font-weight: bold;
    color: #1565c0;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: #333;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    border-radius: 4px;
  }
  button:hover { background: #f0f4ff; color: #1565c0; }
</style>
</head>
<body>
<header>
  <!-- Logo Capital - remplacez le src par le chemin de votre image -->
  <img class="logo-img" src="1001203331.jpg" alt="Logo Capital" />

  <nav class="nav-left">
    <a href="#">Products ▾</a>
    <a href="#">Services ▾</a>
    <a href="#">News &amp; Blog</a>
  </nav>

  <div class="brand">Capital</div>

  <nav class="nav-right">
    <a href="#">About Capital</a>
    <a href="#">Contact</a>
    <button>☰</button>
    <button>&#9740;</button>
    <button>🌐 EN ▾</button>
    <button>Senegal ▾</button>
  </nav>
</header>
</body>
</html>
